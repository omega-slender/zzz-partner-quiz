  <style>
    #app-loader {
      visibility: visible;
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0a0a0a;
      font-family: 'Courier New', monospace;
      color: #e85e00;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #app-loader .loader-icon {
      font-size: 32px;
      animation: loaderPulse 1.5s ease-in-out infinite;
    }

    @keyframes loaderPulse {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }
  </style>

      </div>
    </div>
    <div class="content-shell">
      <div class="screen" id="screen-intro">
        <br>
        <div class="section-label" id="intro-section-label"></div>
        <div class="intro-card anim-scale-in" style="animation-delay:0.25s">
          <div class="intro-icon">📡</div>
          <h2 id="intro-title"></h2>
          <p id="intro-desc"></p>
          <button class="btn-big" id="btn-start" onclick="startQuiz()"></button>
          <button class="btn-last-result hidden" id="btn-last-result" onclick="showLastResult()"></button>
          <div class="lang-selector">
            <button class="lang-btn" data-lang="en" onclick="selectLang('en')">EN</button>
            <button class="lang-btn" data-lang="es" onclick="selectLang('es')">ES</button>
          </div>
        </div>
        <br>
      </div>
      <div class="screen hidden" id="screen-quiz">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span class="progress-label" id="progress-label"></span>
            <span class="progress-num" id="prog-num"></span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="prog-bar" style="width: 3.33%"></div>
          </div>
        </div>
        <div class="section-label" id="q-num"></div>
        <div class="card" id="q-card">
          <div class="q-text" id="q-text"></div>
          <div class="options" id="q-options"></div>
          <div class="btn-wrap">
            <button class="btn-back disabled" id="btn-back" onclick="prevQuestion()"></button>
            <button class="btn disabled" id="btn-next" onclick="nextQuestion()"></button>
          </div>
        </div>
      </div>
      <div class="screen hidden" id="screen-result">
        <div class="section-label" id="result-section-label"></div>
        <div class="result-card" id="result-card"></div>
        <div class="btn-retry-wrap">
          <button class="btn-retry" id="btn-retry" onclick="resetQuiz()"></button>
          <button class="btn-save-image" id="btn-save-image" onclick="saveResultAsImage()"></button>
        </div>
      </div>
    </div>
    <div class="machine-bottom anim-load-up" style="animation-delay:0.15s">
      <div class="lcd-display">
        <div class="lcd-display-inner" id="lcd-text"></div>
      </div>
      <div class="machine-indicator">
        <div class="indicator-dot orange"></div>
        <div class="indicator-dot dim"></div>
        <div class="indicator-dot dim"></div>
      </div>
